name: Docker 构建与发布到 GHCR

on:
  push:
    branches: [main]
    paths:
      - "apps/dapp-token-exchange/contracts/**"
      - "docker/**"
      - ".github/workflows/docker-build-web3.yml"
  # 手动触发选项很适合测试阶段
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 添加必要的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 添加 QEMU 用于多架构支持
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据（标签、标签等）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dapp-token-exchange
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=tag

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Contract.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # build-args: |
          # PACKAGE_NAME=@pfl-wsr/dapp-token-exchange-contracts
          # 使用缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
